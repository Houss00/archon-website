<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCHON V4 | L'Intelligence Neuro-Symbolique</title>
    <!-- Polices propres et techniques -->
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-cream: #fbfaf6;
            --neural-blue: #376d9b;
            --symbolic-gold: #c98e3b;
            --line-color: #8c9ea8;
        }

        body {
            background-color: var(--bg-cream);
            font-family: 'IBM Plex Sans', sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Badge en haut à droite */
        .agnostic-badge {
            position: absolute;
            top: 2rem;
            right: 2rem;
            border: 1px solid var(--symbolic-gold);
            padding: 1rem 1.5rem;
            border-radius: 6px;
            max-width: 320px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.85rem;
            color: var(--symbolic-gold);
            background-color: transparent;
            z-index: 10;
        }

        .agnostic-badge strong {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        /* Conteneur principal divisé en deux */
        .split-layout {
            display: flex;
            flex: 1;
            align-items: center;
            position: relative;
        }

        /* Ligne de séparation centrale */
        .split-layout::after {
            content: '';
            position: absolute;
            left: 50%;
            top: 10%;
            bottom: 10%;
            width: 1px;
            background-color: var(--line-color);
            transform: translateX(-50%);
        }

        .side {
            flex: 1;
            padding: 4rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .side-neural {
            text-align: right;
            padding-right: 4rem;
        }

        .side-symbolic {
            text-align: left;
            padding-left: 4rem;
        }

        /* Typographie */
        h1 {
            font-size: 4.5rem;
            color: var(--neural-blue);
            margin: 0 0 1rem 0;
            font-weight: 400;
            letter-spacing: 2px;
        }

        .subtitle-blue {
            font-size: 1.8rem;
            color: var(--neural-blue);
            margin: 0;
            font-weight: 300;
        }

        .text-gold {
            font-size: 2rem;
            color: var(--symbolic-gold);
            line-height: 1.4;
            max-width: 500px;
            margin: 0;
            font-weight: 400;
        }

        /* Footer discret (optionnel) */
        footer {
            text-align: center;
            padding: 1rem;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.8rem;
            color: var(--line-color);
        }

        a {
            color: inherit;
            text-decoration: underline;
        }

        /* Design Responsive pour téléphone */
        @media (max-width: 900px) {
            .split-layout {
                flex-direction: column;
            }
            .split-layout::after {
                width: 80%;
                height: 1px;
                left: 10%;
                top: 50%;
                bottom: auto;
                transform: translateY(-50%);
            }
            .side-neural {
                text-align: center;
                padding: 2rem;
                padding-top: 8rem;
            }
            .side-symbolic {
                text-align: center;
                padding: 2rem;
            }
            .text-gold {
                margin: 0 auto;
            }
            .agnostic-badge {
                top: 1rem;
                right: 1rem;
                max-width: 250px;
            }
        }
    </style>
</head>
<body>

    <div class="agnostic-badge">
        <strong>DOMAINE AGNOSTIQUE :</strong>
        Fonctionne sur n'importe quel secteur critique sans aucune réécriture du système.
    </div>

    <div class="split-layout">
        <!-- Partie Gauche : Neural (Bleu) -->
        <div class="side side-neural">
            <h1>ARCHON V4</h1>
            <p class="subtitle-blue">L'Intelligence Neuro-Symbolique.</p>
        </div>

        <!-- Partie Droite : Symbolique (Or) -->
        <div class="side side-symbolic">
            <p class="text-gold">Vos documents deviennent une connaissance certifiable, traçable et exécutable.</p>
        </div>
    </div>

    <footer>
        <a href="mailto:contact@archon-nesy.com">contact@archon-nesy.com</a>
    </footer>

</body>
</html>
